<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YENE Operations</title>
    
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="theme-color" content="#00a8ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="YENE">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #121212; color: #ffffff; }
        .navbar { background-color: #1e1e1e; padding: 0 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #00a8ff; height: 60px; z-index: 1000; }
        .logo { font-size: 1.5rem; font-weight: bold; color: #00a8ff; text-decoration: none; display: flex; align-items: center; gap: 10px; }
        .nav-links { list-style: none; display: flex; gap: 1.5rem; }
        .nav-links a { color: #ffffff; text-decoration: none; transition: color 0.3s; font-size: 0.95rem; font-weight: 500; }
        .nav-links a:hover { color: #00a8ff; }
        .container { padding: 2rem; max-width: 1200px; margin: auto; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #121212; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #00a8ff; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="logo">🌐 YENE Portal</a>
        <ul class="nav-links" id="global-nav">
            <li><a href="/">Home</a></li>
            <li><a href="/register">Agent Registration</a></li>
            <li><a href="#" onclick="handleLogout()" id="nav-logout" style="display: none; color: #ff4757;">Secure Logout</a></li>
        </ul>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <script>
        // Register the PWA Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('/static/sw.js').then(function(registration) {
                    console.log('ServiceWorker registration successful with scope: ', registration.scope);
                }, function(err) {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }

        async function checkAuthStatus() {
            const { data: { user } } = await window.supabase.auth.getUser();
            if (user) document.getElementById('nav-logout').style.display = 'inline-block';
        }

        async function handleLogout() {
            const { error } = await window.supabase.auth.signOut();
            if (!error) window.location.href = '/'; 
        }

        document.addEventListener("DOMContentLoaded", checkAuthStatus);
    </script>
</body>
</html>
